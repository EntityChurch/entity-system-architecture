[project]
name   = "Entity System Architecture"
slug   = "entity-system-architecture"
repo   = "entity-system-architecture"
github = "https://github.com/EntityChurch/entity-system-architecture"
intro  = """
The optional layer on top of the core protocol: all the EXTENSION-* specs
(tree, registry, discovery, relay, encryption, identity, content, compute, ...), the SDK
operation specs, the application-layer conventions, and the implementer guides. The
"agree-with-us and you interoperate" surface — divergence is allowed; convergence is the
payoff. Depends on entity-core-protocol.
"""

